<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>11. 6. 2026</title>
<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: url('Harbak.jpg') center no-repeat;
    background-size: auto 100%;
}

.overlay {
    position: absolute;
    top: 40px;      /* posun od horního okraje */
    left: 40px;     /* posun od levého okraje */
    color: white;
    text-align: center;
}

#countdown {
    font-size: 4rem;
    font-weight: bold;
}
</style>
</head>
<body>
<div class="overlay">
<h2></h2>
<div id="countdown">Načítání...</div>
</div>

<script>
const target = new Date("2026-06-11T05:00:00");

function updateCountdown() {
    const diff = target - new Date();

    if (diff <= 0) {
        countdown.textContent = "00:00:00:00";
        return;
    }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor(diff / 3600000) % 24;
    const m = Math.floor(diff / 60000) % 60;
    const s = Math.floor(diff / 1000) % 60;

    countdown.textContent =
        `${String(d).padStart(2,"0")}:${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

const countdown = document.getElementById("countdown");
updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
