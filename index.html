<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odpočet do 11. 6. 2026 05:00</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: flex-end;
    padding-right: 500px;
    align-items: flex-end;
    padding-bottom: 10px;
    font-family: Arial, sans-serif;
    background: url('Harbak.jpg') center/contain no-repeat;
    background-size: 100% auto;
}

.overlay {
    background: rgba(0,0,0,0);
    padding: 70px 40px;
    border-radius: 20px;
    color: white;
    text-align: center;
    margin-bottom: 200px;
}

#countdown {
    font-size: 4rem;
    font-weight: bold;
}
</style>
</head>
<body>
<div class="overlay">
<h2></h2>
<div id="countdown">Načítání...</div>
</div>

<script>
const target = new Date("2026-06-11T05:00:00");

function updateCountdown() {
    const diff = target - new Date();

    if (diff <= 0) {
        countdown.textContent = "00:00:00:00";
        return;
    }

    const d = Math.floor(diff / 86400000);
    const h = Math.floor(diff / 3600000) % 24;
    const m = Math.floor(diff / 60000) % 60;
    const s = Math.floor(diff / 1000) % 60;

    countdown.textContent =
        `${String(d).padStart(2,"0")}:${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

const countdown = document.getElementById("countdown");
updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
